  <!-- Legs -->
  <rect x="92" y="146" width="9" height="22" rx="4" fill="#F59E0B"/>
  <rect x="108" y="146" width="9" height="22" rx="4" fill="#F59E0B"/>
  <!-- Feet -->
  <path d="M88 166 Q80 172 86 174 Q92 170 95 168" stroke="#D97706" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M104 166 Q96 172 102 174 Q108 170 111 168" stroke="#D97706" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Head tuft -->
  <path d="M118 40 Q120 28 124 24 Q126 32 122 38" fill="#A78BFA"/>
  <path d="M124 38 Q128 26 132 23 Q133 31 128 37" fill="#C4B5FD"/>
</svg>