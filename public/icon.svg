<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="180" height="180" rx="36" fill="#7C3AED"/>

  <!-- Tail feathers -->
  <ellipse cx="48" cy="108" rx="18" ry="10" fill="#A78BFA" transform="rotate(-30 48 108)"/>
  <ellipse cx="42" cy="115" rx="16" ry="9" fill="#C4B5FD" transform="rotate(-50 42 115)"/>

  <!-- Body -->
  <ellipse cx="98" cy="112" rx="46" ry="38" fill="#DDD6FE"/>

  <!-- Wing -->
  <ellipse cx="80" cy="118" rx="20" ry="11" fill="#A78BFA" transform="rotate(10 80 118)"/>

  <!-- Neck -->
  <ellipse cx="118" cy="82" rx="18" ry="24" fill="#DDD6FE"/>

  <!-- Head -->
  <circle cx="122" cy="60" r="22" fill="#EDE9FE"/>

  <!-- Eye -->
  <circle cx="130" cy="55" r="5" fill="#1E1B4B"/>
  <circle cx="132" cy="53" r="2" fill="white"/>

  <!-- Beak - upper (hooked, distinctive dodo beak) -->
  <path d="M140 58 Q158 54 156 66 Q148 70 138 66 Z" fill="#F59E0B"/>
  <!-- Beak - lower -->
  <path d="M140 66 Q150 68 148 72 Q142 73 138 68 Z" fill="#D97706"/>
  <!-- Nostril -->
